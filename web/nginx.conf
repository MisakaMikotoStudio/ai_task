server {
    listen 8080;
    server_name _;
    root /app;

    gzip on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_vary on;
    gzip_comp_level 6;

    # Static assets with cache headers
    location ~* \.(css|js|ico|svg|woff2?|ttf|eot|png|jpg|jpeg|gif)$ {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # All requests: try static file first, fallback to index.html (SPA routing)
    location / {
        try_files $uri /index.html;
    }
}
