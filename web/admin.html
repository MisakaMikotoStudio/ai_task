<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理 - AI Task</title>
    <style>
        /* ── 主题变量（与主应用保持一致） ───────────────────── */
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --bg-card: #1c2128;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #6e7681;
            --accent-primary: #58a6ff;
            --accent-success: #3fb950;
            --accent-warning: #d29922;
            --accent-danger: #f85149;
            --accent-purple: #a371f7;
            --border-color: #30363d;
            --border-radius: 8px;
            --border-radius-lg: 12px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
            --transition: all 0.2s ease;
        }

        /* ── 基础重置 ─────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            line-height: 1.6;
        }
        .hide { display: none !important; }

        /* ── 顶部导航 ─────────────────────────────────────── */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
        }
        .header-links a {
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 13px;
            margin-left: 16px;
            transition: var(--transition);
        }
        .header-links a:hover { color: var(--accent-primary); }

        /* ── 布局 ─────────────────────────────────────────── */
        .admin-layout {
            display: grid;
            grid-template-columns: 220px 1fr;
            min-height: calc(100vh - 57px);
        }

        /* ── 侧边栏 ──────────────────────────────────────── */
        .sidebar {
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            padding: 16px 12px;
        }
        .sidebar-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            padding: 0 12px 8px;
        }
        .tab-btn {
            width: 100%;
            text-align: left;
            border: 1px solid transparent;
            border-radius: var(--border-radius);
            background: transparent;
            color: var(--text-secondary);
            padding: 10px 12px;
            margin-bottom: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: var(--transition);
        }
        .tab-btn:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }
        .tab-btn.active {
            background: rgba(88, 166, 255, 0.1);
            color: var(--accent-primary);
            border-color: rgba(88, 166, 255, 0.3);
            font-weight: 600;
        }

        /* ── 内容区域 ─────────────────────────────────────── */
        .content { padding: 24px; }

        /* ── 卡片 ─────────────────────────────────────────── */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-lg);
            padding: 20px;
            box-shadow: var(--shadow-sm);
        }
        .card + .card { margin-top: 16px; }
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin: 0 0 16px 0;
        }

        /* ── 表单控件 ─────────────────────────────────────── */
        .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
        .col { flex: 1; min-width: 160px; }
        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        input, textarea, select {
            width: 100%;
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 8px 12px;
            font-size: 14px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            transition: var(--transition);
        }
        input::placeholder, textarea::placeholder { color: var(--text-muted); }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
        }
        select { cursor: pointer; }
        select option { background: var(--bg-secondary); color: var(--text-primary); }

        label.checkbox-label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: var(--text-secondary);
            cursor: pointer;
        }
        label.checkbox-label input[type="checkbox"] { width: auto; cursor: pointer; }

        /* ── 按钮 ─────────────────────────────────────────── */
        button { font-size: 14px; border: 0; border-radius: var(--border-radius); padding: 8px 16px; cursor: pointer; transition: var(--transition); }
        .btn-primary {
            background: var(--accent-primary);
            color: #fff;
        }
        .btn-primary:hover { background: #4c9aed; }
        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }
        .btn-secondary:hover { background: var(--border-color); color: var(--text-primary); }
        .btn-danger {
            background: rgba(248, 81, 73, 0.15);
            color: var(--accent-danger);
            border: 1px solid rgba(248, 81, 73, 0.3);
        }
        .btn-danger:hover { background: rgba(248, 81, 73, 0.25); }
        .btn-sm { padding: 5px 12px; font-size: 12px; }

        /* ── 表格 ─────────────────────────────────────────── */
        .table-wrap { overflow-x: auto; margin-top: 12px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        thead th {
            padding: 10px 14px;
            text-align: left;
            white-space: nowrap;
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            border-bottom: 1px solid var(--border-color);
        }
        thead th:first-child { border-radius: var(--border-radius) 0 0 0; }
        thead th:last-child { border-radius: 0 var(--border-radius) 0 0; }
        tbody td {
            padding: 10px 14px;
            white-space: nowrap;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
        }
        tbody tr { transition: var(--transition); }
        tbody tr:hover { background: rgba(88, 166, 255, 0.04); }
        tbody tr:last-child td { border-bottom: none; }

        /* ── 状态徽章 ─────────────────────────────────────── */
        .status-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
            line-height: 1.6;
        }
        .status-pending {
            background: rgba(210, 153, 34, 0.15);
            color: var(--accent-warning);
            border: 1px solid rgba(210, 153, 34, 0.3);
        }
        .status-paid {
            background: rgba(63, 185, 80, 0.15);
            color: var(--accent-success);
            border: 1px solid rgba(63, 185, 80, 0.3);
        }
        .status-failed {
            background: rgba(248, 81, 73, 0.15);
            color: var(--accent-danger);
            border: 1px solid rgba(248, 81, 73, 0.3);
        }
        .status-refunded {
            background: rgba(163, 113, 247, 0.15);
            color: var(--accent-purple);
            border: 1px solid rgba(163, 113, 247, 0.3);
        }
        .status-online {
            background: rgba(63, 185, 80, 0.15);
            color: var(--accent-success);
            border: 1px solid rgba(63, 185, 80, 0.3);
        }
        .status-offline {
            background: rgba(248, 81, 73, 0.15);
            color: var(--accent-danger);
            border: 1px solid rgba(248, 81, 73, 0.3);
        }

        /* ── 分页 ─────────────────────────────────────────── */
        .pagination {
            margin-top: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            color: var(--text-secondary);
        }
        .pagination button:disabled { opacity: 0.35; cursor: not-allowed; }

        /* ── 空状态 ────────────────────────────────────────── */
        .empty-cell { text-align: center; color: var(--text-muted); padding: 32px 10px !important; }

        /* ── 金额高亮 ─────────────────────────────────────── */
        .amount { font-weight: 600; color: var(--accent-primary); }

        /* ── 响应式 ────────────────────────────────────────── */
        @media (max-width: 860px) {
            .admin-layout { grid-template-columns: 1fr; }
            .sidebar { border-right: 0; border-bottom: 1px solid var(--border-color); display: flex; gap: 8px; padding: 12px; }
            .sidebar-label { display: none; }
            .tab-btn { width: auto; }
            .content { padding: 16px; }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>后台管理</h1>
        <div class="header-links">
            <a href="/admin">密钥/应用</a>
            <a href="/index.html">任务系统</a>
        </div>
    </header>

    <div id="admin-view" class="admin-layout">
        <aside class="sidebar">
            <div class="sidebar-label">管理菜单</div>
            <button class="tab-btn active" data-tab="products">商品管理</button>
            <button class="tab-btn" data-tab="orders">订单管理</button>
        </aside>
        <main class="content">
            <!-- ── 商品管理 ──────────────────────────────── -->
            <section id="tab-products">
                <div class="card">
                    <h3 class="section-title">新增商品</h3>
                    <form id="create-product-form">
                        <div class="row">
                            <div class="col">
                                <label class="form-label">商品 Key</label>
                                <input type="text" name="key" required placeholder="唯一标识">
                            </div>
                            <div class="col">
                                <label class="form-label">商品名称</label>
                                <input type="text" name="title" required placeholder="商品名称">
                            </div>
                            <div class="col">
                                <label class="form-label">价格 (元)</label>
                                <input type="number" name="price" min="0.01" step="0.01" required placeholder="0.00">
                            </div>
                        </div>
                        <div class="row" style="margin-top:12px;">
                            <div class="col">
                                <label class="form-label">有效期 (秒)</label>
                                <input type="number" name="expire_time" min="1" placeholder="留空表示永久">
                            </div>
                            <div class="col">
                                <label class="form-label">封面图 URL</label>
                                <input type="text" name="icon" placeholder="https://...">
                            </div>
                            <div class="col">
                                <label class="form-label">商品描述</label>
                                <input type="text" name="desc" placeholder="简要描述">
                            </div>
                        </div>
                        <div style="margin-top:12px;">
                            <label class="checkbox-label"><input type="checkbox" name="support_continue"> 支持续费</label>
                        </div>
                        <div style="margin-top:16px;"><button type="submit" class="btn-primary">添加商品</button></div>
                    </form>
                </div>
                <div class="card">
                    <h3 class="section-title">商品列表</h3>
                    <div class="table-wrap">
                        <table id="products-table">
                            <thead><tr><th>ID</th><th>Key</th><th>名称</th><th>价格</th><th>有效期</th><th>续费</th><th>创建时间</th><th>状态</th><th>操作</th></tr></thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </section>

            <!-- ── 订单管理 ──────────────────────────────── -->
            <section id="tab-orders" class="hide">
                <div class="card">
                    <h3 class="section-title">订单查询</h3>
                    <div class="row">
                        <div class="col">
                            <label class="form-label">用户 ID</label>
                            <input type="number" id="order-user-filter" placeholder="可选，输入用户 ID">
                        </div>
                        <div class="col">
                            <label class="form-label">订单状态</label>
                            <select id="order-status-filter">
                                <option value="">全部状态</option>
                                <option value="pending">待支付</option>
                                <option value="paid">已支付</option>
                                <option value="failed">失败</option>
                                <option value="refunded">已退款</option>
                            </select>
                        </div>
                        <div style="display:flex;align-items:flex-end;">
                            <button id="load-orders-btn" class="btn-primary">查询</button>
                        </div>
                    </div>
                </div>
                <div class="card">
                    <h3 class="section-title">订单列表</h3>
                    <div class="table-wrap">
                        <table id="orders-table">
                            <thead><tr><th>ID</th><th>用户ID</th><th>商品Key</th><th>金额</th><th>状态</th><th>交易号</th><th>创建时间</th><th>操作</th></tr></thead>
                            <tbody></tbody>
                        </table>
                    </div>
                    <div class="pagination">
                        <button id="orders-prev-btn" class="btn-secondary btn-sm" disabled>上一页</button>
                        <span id="orders-page-info" style="color:var(--text-muted);">-</span>
                        <button id="orders-next-btn" class="btn-secondary btn-sm" disabled>下一页</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="/js/utils.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/admin.js"></script>
</body>
</html>
