<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理 - AI Task</title>
    <!-- Quill 富文本编辑器 -->
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f6fa;
            --card: #fff;
            --border: #e5e7eb;
            --text: #1f2937;
            --text-secondary: #6b7280;
            --primary: #4f46e5;
            --primary-light: #eef2ff;
            --primary-hover: #4338ca;
            --danger: #dc2626;
            --danger-light: #fef2f2;
            --success: #16a34a;
            --success-light: #f0fdf4;
            --radius: 12px;
            --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
            --shadow-lg: 0 10px 40px rgba(0,0,0,.12);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif; line-height: 1.5; }

        /* Header */
        .header {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: var(--shadow);
        }
        .header h1 { font-size: 18px; font-weight: 700; color: var(--text); }
        .header-links { display: flex; gap: 16px; }
        .header-links a {
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 13px;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all .2s;
        }
        .header-links a:hover { color: var(--primary); background: var(--primary-light); }

        /* Layout */
        .admin-layout { display: grid; grid-template-columns: 200px 1fr; min-height: calc(100vh - 65px); }
        .sidebar {
            background: var(--card);
            border-right: 1px solid var(--border);
            padding: 16px 12px;
        }
        .tab-btn {
            width: 100%;
            text-align: left;
            border: none;
            border-radius: 8px;
            background: transparent;
            padding: 10px 14px;
            margin-bottom: 4px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-secondary);
            transition: all .2s;
            font-weight: 500;
        }
        .tab-btn:hover { background: var(--bg); color: var(--text); }
        .tab-btn.active { background: var(--primary-light); color: var(--primary); font-weight: 600; }
        .content { padding: 24px; overflow-y: auto; }
        .hide { display: none !important; }

        /* Section header */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .section-title { font-size: 20px; font-weight: 700; color: var(--text); }

        /* Buttons */
        button { font-family: inherit; }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: none;
            border-radius: 8px;
            padding: 9px 18px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all .2s;
        }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-secondary { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
        .btn-secondary:hover { background: #e5e7eb; }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-danger:hover { background: #b91c1c; }
        .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 6px; }

        /* Product cards grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }
        .product-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: box-shadow .2s, transform .2s;
            display: flex;
            flex-direction: column;
        }
        .product-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
        .product-card.offline { opacity: .7; }
        .product-card-icon {
            width: 100%;
            height: 160px;
            object-fit: cover;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .product-card-icon-placeholder {
            width: 100%;
            height: 160px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,.6);
            font-size: 40px;
        }
        .product-card-body { padding: 16px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .product-card-title { font-size: 16px; font-weight: 600; color: var(--text); }
        .product-card-key { font-size: 12px; color: var(--text-secondary); font-family: monospace; background: var(--bg); padding: 2px 8px; border-radius: 4px; display: inline-block; }
        .product-card-desc {
            font-size: 13px;
            color: var(--text-secondary);
            flex: 1;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            line-height: 1.5;
        }
        .product-card-meta { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
        .product-card-price { font-size: 22px; font-weight: 700; color: var(--primary); }
        .product-card-price::before { content: '¥'; font-size: 14px; }
        .product-card-badge {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 500;
        }
        .badge-success { background: var(--success-light); color: var(--success); }
        .badge-danger { background: var(--danger-light); color: var(--danger); }
        .badge-info { background: var(--primary-light); color: var(--primary); }
        .badge-muted { background: #f3f4f6; color: var(--text-secondary); }
        .product-card-footer {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .product-card-date { font-size: 12px; color: var(--text-secondary); }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        .empty-state-icon { font-size: 48px; margin-bottom: 12px; opacity: .4; }
        .empty-state-text { font-size: 15px; }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn .2s;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: var(--card);
            border-radius: 16px;
            width: 100%;
            max-width: 640px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
            animation: slideUp .3s ease;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
        }
        .modal-title { font-size: 18px; font-weight: 700; }
        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-secondary);
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            transition: all .2s;
        }
        .modal-close:hover { background: var(--bg); color: var(--text); }
        .modal-body { padding: 24px; }
        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        /* Form styles */
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .form-input {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 14px;
            color: var(--text);
            background: var(--card);
            transition: border-color .2s;
            font-family: inherit;
        }
        .form-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,.1); }
        .form-input::placeholder { color: #9ca3af; }
        .form-checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            cursor: pointer;
            color: var(--text);
        }
        .form-checkbox-label input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--primary); }

        /* Quill editor */
        #product-desc-editor { min-height: 120px; border-radius: 0 0 8px 8px; }
        #product-desc-editor .ql-editor { min-height: 120px; font-size: 14px; }
        .ql-toolbar.ql-snow { border-radius: 8px 8px 0 0; border-color: var(--border); }
        .ql-container.ql-snow { border-radius: 0 0 8px 8px; border-color: var(--border); }

        /* Orders table (keep simple) */
        .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); }
        .card-body { padding: 20px; }
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: var(--bg); font-weight: 600; color: var(--text-secondary); font-size: 12px; text-transform: uppercase; letter-spacing: .5px; }
        td { color: var(--text); }
        .pagination { margin-top: 16px; display: flex; align-items: center; gap: 10px; font-size: 13px; }
        .pagination button { padding: 6px 14px; }
        .filter-row { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: flex-end; }
        .filter-row .form-group { margin-bottom: 0; }
        select.form-input { appearance: auto; }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Responsive */
        @media (max-width: 860px) {
            .admin-layout { grid-template-columns: 1fr; }
            .sidebar { border-right: 0; border-bottom: 1px solid var(--border); display: flex; gap: 4px; padding: 8px 12px; }
            .tab-btn { width: auto; }
            .products-grid { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
            .modal { max-width: 100%; margin: 10px; }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>后台管理 - 商品/订单</h1>
        <div class="header-links">
            <a href="/admin">秘钥/应用</a>
            <a href="/index.html">任务系统</a>
        </div>
    </header>

    <div id="admin-view" class="admin-layout">
        <aside class="sidebar">
            <button class="tab-btn active" data-tab="products">商品管理</button>
            <button class="tab-btn" data-tab="orders">订单管理</button>
        </aside>
        <main class="content">
            <!-- 商品管理 -->
            <section id="tab-products">
                <div class="section-header">
                    <h2 class="section-title">商品管理</h2>
                    <button id="open-create-product-btn" class="btn btn-primary">+ 新增商品</button>
                </div>
                <div id="products-grid" class="products-grid">
                    <div class="empty-state">
                        <div class="empty-state-icon">&#128230;</div>
                        <p class="empty-state-text">加载中...</p>
                    </div>
                </div>
            </section>

            <!-- 订单管理 -->
            <section id="tab-orders" class="hide">
                <div class="section-header">
                    <h2 class="section-title">订单管理</h2>
                </div>
                <div class="card">
                    <div class="card-body">
                        <div class="filter-row">
                            <div class="form-group">
                                <label class="form-label">用户 ID</label>
                                <input type="number" id="order-user-filter" class="form-input" placeholder="可选" style="width:140px;">
                            </div>
                            <div class="form-group">
                                <label class="form-label">订单状态</label>
                                <select id="order-status-filter" class="form-input" style="width:140px;">
                                    <option value="">全部</option>
                                    <option value="pending">pending</option>
                                    <option value="paid">paid</option>
                                    <option value="failed">failed</option>
                                    <option value="refunded">refunded</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <button id="load-orders-btn" class="btn btn-primary">查询</button>
                            </div>
                        </div>
                        <div class="table-wrap">
                            <table id="orders-table">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>用户ID</th>
                                        <th>商品Key</th>
                                        <th>金额</th>
                                        <th>状态</th>
                                        <th>交易号</th>
                                        <th>创建时间</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                        <div class="pagination">
                            <button id="orders-prev-btn" class="btn btn-secondary btn-sm" disabled>上一页</button>
                            <span id="orders-page-info" style="color:var(--text-secondary);font-size:13px;">-</span>
                            <button id="orders-next-btn" class="btn btn-secondary btn-sm" disabled>下一页</button>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- 新增商品 Modal -->
    <div id="create-product-modal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">新增商品</h3>
                <button class="modal-close" id="close-create-modal">&times;</button>
            </div>
            <form id="create-product-form">
                <div class="modal-body">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">商品 Key（唯一）</label>
                            <input type="text" name="key" class="form-input" required placeholder="如 pro_monthly">
                        </div>
                        <div class="form-group">
                            <label class="form-label">商品名称</label>
                            <input type="text" name="title" class="form-input" required placeholder="如 专业版月卡">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">价格（元）</label>
                            <input type="number" name="price" min="0.01" step="0.01" class="form-input" required placeholder="0.00">
                        </div>
                        <div class="form-group">
                            <label class="form-label">有效期（秒，空=永久）</label>
                            <input type="number" name="expire_time" min="1" class="form-input" placeholder="如 2592000（30天）">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">封面图 URL</label>
                        <input type="text" name="icon" class="form-input" placeholder="https://...">
                    </div>
                    <div class="form-group">
                        <label class="form-label">商品描述</label>
                        <div id="product-desc-editor"></div>
                    </div>
                    <div class="form-group">
                        <label class="form-checkbox-label">
                            <input type="checkbox" name="support_continue">
                            支持续费
                        </label>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="cancel-create-modal">取消</button>
                    <button type="submit" class="btn btn-primary">确认添加</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>
    <script src="/js/utils.js?v=1"></script>
    <script src="/js/api.js?v=1"></script>
    <script src="/js/admin.js?v=1"></script>
</body>
</html>
