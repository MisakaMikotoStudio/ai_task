# AI任务管理系统配置文件

[server]
# 监听地址: "0.0.0.0" 允许外部访问, "127.0.0.1" 仅本机
host = "0.0.0.0"
# 服务端口
port = 8080
# 调试模式（生产环境请设为 false）
debug = false

[database]
# 数据库类型（目前仅支持 mysql）
type = "mysql"
# 数据库地址
url = "xxxx"
# 数据库端口
port = 3306
# 用户名
username = "xxx"
# 密码
password = "xxxx"
# 数据库名
database = "xxx"

[alipay]
# 支付宝应用 ID
app_id = "your-alipay-app-id"
# 应用 RSA2 私钥（PKCS8 格式，不含 -----BEGIN/END PRIVATE KEY----- 头尾，无换行）
app_private_key = "your-app-private-key"
# 支付宝公钥（不含头尾，无换行）
alipay_public_key = "your-alipay-public-key"
# 支付宝异步通知回调 URL（必须公网可访问）
notify_url = "https://your-domain.com/api/commercial/alipay/notify"
# 支付完成后同步跳转 URL
return_url = "https://your-domain.com/pay/result"
# 支付宝网关（生产环境）
gateway = "https://openapi.alipay.com/gateway.do"
# 是否使用沙箱环境
sandbox = false
# 接口内容 AES 加密密钥（Base64 格式，在支付宝开放平台"开发设置-接口加签方式"中获取）
# 选填。配置后，接口请求/响应的 biz_content 将使用 AES-128-CBC 加密，提升传输安全性。
# 使用"获取会员手机号"等敏感能力时必填。
app_encrypt_key = ""

[default_database]
# 是否启用"生成默认数据库"功能
enabled = false
# 数据库实例地址（腾讯云 MySQL 等）
url = "your-db-instance.mysql.rds.tencentcloud.com"
# 数据库实例端口
port = 3306
# 管理员账号（需具有 CREATE DATABASE、CREATE USER、GRANT 权限）
admin_username = "root"
# 管理员密码
admin_password = "your-admin-password"
# 为应用数据库分配的访问账号（所有自动创建的数据库共用此账号）
app_username = "app_user"
# 为应用数据库分配的访问密码
app_password = "your-app-password"

[oss]
# 是否启用 OSS（腾讯云 COS）
enabled = false
# 腾讯云 SecretId
secret_id = "your-secret-id"
# 腾讯云 SecretKey
secret_key = "your-secret-key"
# 地域
region = "ap-guangzhou"
# Bucket 名称（含 AppId 后缀，如 mybucket-1234567890）
bucket = "your-bucket-1234567890"
# 公开访问域名前缀
base_url = "https://your-bucket-1234567890.cos.ap-guangzhou.myqcloud.com"
# ⚠️  Bucket 配置要求：
#   商品图片上传后会通过 PutObjectACL 设置为"公有读"权限。
#   请确保腾讯云 COS 控制台中该 Bucket 满足以下条件：
#   1. 【权限管理 → 公有读写 / Block Public Access】中，「阻止公有ACL（BlockPublicAcls）」
#      选项必须处于关闭状态，否则 PutObjectACL 调用会返回 400 AccessDenied，导致上传失败。
#   2. Bucket 本身的访问权限建议保持「私有读写」；单个对象（product/icon/）的 ACL 会
#      被代码显式设置为「公有读」，在控制台表现为「公有读私有写」而非「继承权限」。